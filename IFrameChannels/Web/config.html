<div id="IFrameChannelsConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-button,emby-input,emby-select">
    <div data-role="content">
        <div class="content-primary">
            <div class="verticalSection verticalSection-extrabottompadding">
                <div class="sectionTitleContainer flex align-items-center">
                    <h2 class="sectionTitle">IFrame Channels — Configuration</h2>
                </div>

                <div class="inputContainer">
                    <label class="inputLabel" for="ifc-library-name">Library name (shown in sidebar)</label>
                    <input type="text" id="ifc-library-name" class="emby-input" />
                    <div class="fieldDescription">Restart Jellyfin after changing this name.</div>
                </div>

                <div class="verticalSection">
                    <h3 class="sectionTitle">Channels</h3>
                    <div id="ifc-channels-list"></div>
                    <br />
                    <button type="button" is="emby-button" class="raised button-cancel block" id="ifc-add-btn">
                        <span>+ Add channel</span>
                    </button>
                </div>

                <div class="verticalSection verticalSection-extrabottompadding">
                    <button type="button" id="ifc-save-btn" is="emby-button" class="raised button-submit block">
                        <span>Save</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <style>
        .ifc-channel-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .ifc-channel-row input { flex: 1; }
        .ifc-remove-btn { background: #cc0000 !important; color: white !important; margin: 0 !important; padding: 5px 10px !important; min-width: auto !important; }
    </style>

    <script type="text/javascript">
        function ifcCreateRow(name = '', url = '', thumb = '') {
            const list = document.getElementById('ifc-channels-list');
            const row = document.createElement('div');
            row.className = 'ifc-channel-row';
            row.innerHTML = `
                <div class="inputContainer" style="flex:1; margin:0;">
                    <input type="text" class="emby-input ifc-name" placeholder="Name" value="${name}" />
                </div>
                <div class="inputContainer" style="flex:2; margin:0;">
                    <input type="text" class="emby-input ifc-url" placeholder="URL (iframe)" value="${url}" />
                </div>
                <div class="inputContainer" style="flex:1; margin:0;">
                    <input type="text" class="emby-input ifc-thumb" placeholder="Thumb URL" value="${thumb}" />
                </div>
                <button type="button" is="emby-button" class="ifc-remove-btn">✕</button>
            `;
            
            row.querySelector('button').onclick = () => row.remove();
            list.appendChild(row);
        }

        function ifcSave() {
            Dashboard.showLoadingMsg();
            const rows = document.querySelectorAll('.ifc-channel-row');
            const channels = [];
            
            rows.forEach(row => {
                const name = row.querySelector('.ifc-name').value;
                const url = row.querySelector('.ifc-url').value;
                const thumb = row.querySelector('.ifc-thumb').value;
                if (name && url) {
                    channels.push({ Name: name, Url: url, ThumbnailUrl: thumb });
                }
            });

            const config = {
                LibraryName: document.getElementById('ifc-library-name').value || 'Channels',
                Channels: channels
            };

            console.log('Sending config:', config);

            ApiClient.fetch({
                type: 'POST',
                url: ApiClient.getUrl('IFrameChannels/Config'),
                data: JSON.stringify(config),
                contentType: 'application/json'
            }).then(() => {
                Dashboard.hideLoadingMsg();
                Dashboard.alert('Saved! Now RESTART Jellyfin server to see changes.');
            }).catch((err) => {
                Dashboard.hideLoadingMsg();
                Dashboard.alert('Error: ' + err);
            });
        }

        document.querySelector('#IFrameChannelsConfigPage').addEventListener('viewshow', function () {
            const page = this;
            ApiClient.getJSON(ApiClient.getUrl('IFrameChannels/Config')).then((data) => {
                document.getElementById('ifc-library-name').value = data.LibraryName || 'Channels';
                const list = document.getElementById('ifc-channels-list');
                list.innerHTML = '';
                if (data.Channels) {
                    data.Channels.forEach(ch => ifcCreateRow(ch.Name, ch.Url, ch.ThumbnailUrl));
                }
            });

            document.getElementById('ifc-save-btn').onclick = ifcSave;
            document.getElementById('ifc-add-btn').onclick = () => ifcCreateRow();
        });
    </script>
</div>
