<div id="IFrameChannelsConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-button,emby-input,emby-select">
    <div data-role="content">
        <div class="content-primary">
            <div class="verticalSection verticalSection-extrabottompadding">
                <div class="sectionTitleContainer flex align-items-center">
                    <h2 class="sectionTitle">IFrame Channels — Configuration</h2>
                </div>

                <div class="inputContainer">
                    <label class="inputLabel" for="ifc-library-name">Library name (shown in sidebar)</label>
                    <input type="text" id="ifc-library-name" label="Library name" class="emby-input" />
                    <div class="fieldDescription">Restart Jellyfin after changing this name.</div>
                </div>

                <div class="verticalSection">
                    <h3 class="sectionTitle">Channels</h3>
                    <div id="ifc-channels-list"></div>
                    <br />
                    <button type="button" is="emby-button" class="raised button-cancel block" onclick="ifcAddChannel()">
                        <span>+ Add channel</span>
                    </button>
                </div>

                <div class="verticalSection verticalSection-extrabottompadding">
                    <button type="button" is="emby-button" class="raised button-submit block" onclick="ifcSave()">
                        <span>Save</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <style>
        .ifc-channel-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .ifc-channel-row input { flex: 1; }
        .ifc-remove-btn { background: #cc0000 !important; color: white !important; }
    </style>

    <script type="text/javascript">
        function ifcAddChannel(name = '', url = '', thumb = '') {
            const list = document.getElementById('ifc-channels-list');
            const row = document.createElement('div');
            row.className = 'ifc-channel-row';
            row.innerHTML = `
                <div class="inputContainer" style="flex:1">
                    <input type="text" class="emby-input" placeholder="Name" value="${name}" data-field="name" />
                </div>
                <div class="inputContainer" style="flex:2">
                    <input type="text" class="emby-input" placeholder="URL (iframe)" value="${url}" data-field="url" />
                </div>
                <div class="inputContainer" style="flex:1">
                    <input type="text" class="emby-input" placeholder="Thumb URL" value="${thumb}" data-field="thumb" />
                </div>
                <button type="button" is="emby-button" class="raised ifc-remove-btn" onclick="this.parentElement.remove()">✕</button>
            `;
            list.appendChild(row);
        }

        function ifcSave() {
            Dashboard.showLoadingMsg();
            const rows = document.querySelectorAll('.ifc-channel-row');
            const channels = [];
            
            rows.forEach(row => {
                const name = row.querySelector('[data-field="name"]').value;
                const url = row.querySelector('[data-field="url"]').value;
                const thumb = row.querySelector('[data-field="thumb"]').value;
                if (name && url) channels.push({ Name: name, Url: url, ThumbnailUrl: thumb });
            });

            const config = {
                LibraryName: document.getElementById('ifc-library-name').value,
                Channels: channels
            };

            ApiClient.post(ApiClient.getUrl('IFrameChannels/Config'), config).then(() => {
                Dashboard.hideLoadingMsg();
                Dashboard.alert('Settings saved! Please restart Jellyfin to update the sidebar name.');
            }).catch((err) => {
                Dashboard.hideLoadingMsg();
                Dashboard.alert('Error saving: ' + err);
            });
        }

        document.querySelector('#IFrameChannelsConfigPage').addEventListener('viewshow', function () {
            const page = this;
            ApiClient.getJSON(ApiClient.getUrl('IFrameChannels/Config')).then((data) => {
                page.querySelector('#ifc-library-name').value = data.LibraryName || 'Channels';
                const list = page.querySelector('#ifc-channels-list');
                list.innerHTML = '';
                if (data.Channels) {
                    data.Channels.forEach(ch => ifcAddChannel(ch.Name, ch.Url, ch.ThumbnailUrl));
                }
            });
        });
    </script>
</div>
