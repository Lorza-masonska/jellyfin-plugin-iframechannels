<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Channels</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #101010;
            color: #fff;
            font-family: sans-serif;
        }

        #ifc-grid-view {
            padding: 24px;
        }

        #ifc-page-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .ifc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .ifc-card {
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            aspect-ratio: 16/9;
            position: relative;
        }

        .ifc-card:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 24px rgba(0,164,220,0.4);
        }

        .ifc-card-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .ifc-card-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e3a5f, #0a1a2e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .ifc-card-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            padding: 20px 10px 8px;
            font-size: 14px;
            font-weight: 600;
        }

        /* Player view */
        #ifc-player-view {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            z-index: 9999;
            flex-direction: column;
        }

        #ifc-player-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: rgba(0,0,0,0.8);
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 10000;
            opacity: 1;
            transition: opacity 0.3s;
        }

        #ifc-player-bar.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #ifc-back-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        #ifc-back-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        #ifc-player-title {
            font-size: 16px;
            font-weight: 600;
        }

        #ifc-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .ifc-empty {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .ifc-empty a {
            color: #00a4dc;
        }
    </style>
</head>
<body>

<!-- Grid view -->
<div id="ifc-grid-view">
    <div id="ifc-page-title">Channels</div>
    <div class="ifc-grid" id="ifc-grid"></div>
</div>

<!-- Player view -->
<div id="ifc-player-view">
    <div id="ifc-player-bar">
        <button id="ifc-back-btn" onclick="ifcClosePlayer()">← Back</button>
        <span id="ifc-player-title"></span>
    </div>
    <iframe id="ifc-iframe" allowfullscreen allow="autoplay; fullscreen; encrypted-media"></iframe>
</div>

<script>
    const ApiClient = window.ApiClient;
    let hideBarTimer = null;

    async function ifcLoadChannels() {
        try {
            const resp = await ApiClient.fetch({
                type: 'GET',
                url: ApiClient.getUrl('IFrameChannels/Config')
            });
            const data = JSON.parse(resp);

            document.getElementById('ifc-page-title').textContent = data.LibraryName || 'Channels';
            document.title = data.LibraryName || 'Channels';

            const grid = document.getElementById('ifc-grid');
            grid.innerHTML = '';

            const channels = data.Channels || [];

            if (channels.length === 0) {
                grid.innerHTML = `<div class="ifc-empty" style="grid-column:1/-1">
                    No channels configured yet.<br>
                    Go to <a href="configurationpage?name=IFrameChannels">Settings → IFrame Channels</a> to add some.
                </div>`;
                return;
            }

            channels.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'ifc-card';
                card.title = ch.Name;

                if (ch.ThumbnailUrl) {
                    card.innerHTML = `
                        <img class="ifc-card-thumb" src="${escHtml(ch.ThumbnailUrl)}" alt="${escHtml(ch.Name)}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" />
                        <div class="ifc-card-placeholder" style="display:none">📺</div>
                        <div class="ifc-card-label">${escHtml(ch.Name)}</div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="ifc-card-placeholder">📺</div>
                        <div class="ifc-card-label">${escHtml(ch.Name)}</div>
                    `;
                }

                card.addEventListener('click', () => ifcOpenPlayer(ch.Name, ch.Url));
                grid.appendChild(card);
            });
        } catch (e) {
            console.error('IFrameChannels: failed to load channels', e);
            document.getElementById('ifc-grid').innerHTML = `<div class="ifc-empty" style="grid-column:1/-1">Failed to load channels.</div>`;
        }
    }

    function ifcOpenPlayer(name, url) {
        document.getElementById('ifc-player-title').textContent = name;
        document.getElementById('ifc-iframe').src = url;
        const player = document.getElementById('ifc-player-view');
        player.style.display = 'flex';

        // Auto-hide bar after 3s
        resetHideBar();
        player.addEventListener('mousemove', resetHideBar);
        player.addEventListener('touchstart', resetHideBar);
    }

    function ifcClosePlayer() {
        const player = document.getElementById('ifc-player-view');
        player.style.display = 'none';
        document.getElementById('ifc-iframe').src = '';
        clearTimeout(hideBarTimer);
        document.getElementById('ifc-player-bar').classList.remove('hidden');
    }

    function resetHideBar() {
        const bar = document.getElementById('ifc-player-bar');
        bar.classList.remove('hidden');
        clearTimeout(hideBarTimer);
        hideBarTimer = setTimeout(() => bar.classList.add('hidden'), 3000);
    }

    function escHtml(str) {
        return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    ifcLoadChannels();
</script>
</body>
</html>
